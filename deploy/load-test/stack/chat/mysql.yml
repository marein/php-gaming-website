version: '3.4'

services:
    chat-mysql:
        image: marein/php-gaming-website:mysql
        command: mysqld --max-connections=1000
        environment:
            MYSQL_ROOT_PASSWORD: password
        volumes:
            - chat-mysql:/var/lib/mysql
        deploy:
            placement:
                constraints:
                    - "node.labels.chat-mysql==1"
    chat-mysql-exporter:
        image: prom/mysqld-exporter
        environment:
            DATA_SOURCE_NAME: "root:password@(chat-mysql:3306)/"
        deploy:
            placement:
                constraints:
                    - "node.labels.chat-mysql==1"
            labels:
                - "prometheus-job=mysql"
                - "prometheus-port=9104"

volumes:
    chat-mysql:
