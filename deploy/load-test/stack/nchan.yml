version: '3.4'

services:
    nchan:
        image: marein/php-gaming-website:nchan
        deploy:
            placement:
                constraints:
                    - "node.labels.nchan==1"
            labels:
                - "traefik.enable=true"
                - "traefik.http.routers.nchan.priority=20"
                - "traefik.http.routers.nchan.rule=PathPrefix(`/sse`)"
                - "traefik.http.services.nchan.loadbalancer.server.port=80"
                - "prometheus-job=nchan"
                - "prometheus-port=81"
